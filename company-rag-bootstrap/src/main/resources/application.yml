server:
  port: 8080

spring:
  application:
    name: company-rag
  mvc:
    static-path-pattern: /static/**
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
  profiles:
    active: dev
  # 禁用 Spring Cloud Function 自动配置(解决与 Spring Boot 3.4.4 的兼容性问题)
  cloud:
    function:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5433/company_rag
    username: postgres
    password: difyai123456
    driver-class-name: org.postgresql.Driver
    # 注意：不能设置 connection-init-sql，因为会在每次获取连接时重置 search_path
    # 租户 schema 切换由 TenantContextHelper 在请求拦截器中动态设置
  vectorstore:
    pgvector:
      index-type: HNSW
      distance-type: COSINE_DISTANCE
      dimension: 1024
      remove-existing-vector-store-table: false
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: difyai123456
      database: 0

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  ratelimiter:
    configs:
      default:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 500ms

# Actuator / Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

# 日志
logging:
  level:
    com.company.rag: DEBUG
    org.springframework.ai: INFO
