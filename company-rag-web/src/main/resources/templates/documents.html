<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档管理 - CompanyRag</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }
        .app-header { height: 56px; background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; }
        .app-header h1 { font-size: 18px; }
        .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
        .doc-table { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .page-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    </style>
</head>
<body>
<div id="app">
    <header class="app-header">
        <h1>📚 CompanyRag - 文档管理</h1>
        <el-button size="small" plain @click="goBack" style="color:white;border-color:rgba(255,255,255,0.5);">← 返回</el-button>
    </header>
    <div class="container">
        <div class="doc-table">
            <div class="page-title">📄 文档列表</div>
            <el-table :data="documents" stripe style="width:100%">
                <el-table-column prop="fileName" label="文件名" min-width="200" />
                <el-table-column prop="fileType" label="类型" width="80" />
                <el-table-column prop="fileSize" label="大小" width="100" :formatter="fmtSize" />
                <el-table-column prop="chunkCount" label="切分块数" width="100" />
                <el-table-column prop="status" label="状态" width="100">
                    <template #default="scope">
                        <el-tag :type="scope.row.status === 2 ? 'success' : 'warning'" size="small">
                            {{ scope.row.status === 2 ? '已完成' : '处理中' }}
                        </el-tag>
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="120">
                    <template #default="scope">
                        <el-button size="small" type="danger" text @click="deleteDoc(scope.row.id)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>
        </div>
    </div>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        const documents = ref([]);
        function fmtSize(row, col, val) {
            if (!val) return '0B';
            const units = ['B','KB','MB','GB'];
            let i = 0, s = val;
            while (s >= 1024 && i < 3) { s /= 1024; i++; }
            return s.toFixed(1) + units[i];
        }
        async function loadDocs() {
            const res = await fetch('/api/document/list?tenantId=1');
            const json = await res.json();
            if (json.code === 200) documents.value = json.data || [];
        }
        async function deleteDoc(id) {
            await fetch('/api/document/' + id, { method: 'DELETE' });
            ElementPlus.ElMessage.success('已删除');
            loadDocs();
        }
        function goBack() { window.location.href = '/'; }
        onMounted(loadDocs);
        return { documents, fmtSize, deleteDoc, goBack };
    }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
