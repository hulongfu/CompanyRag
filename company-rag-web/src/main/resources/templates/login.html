<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - CompanyRag</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .login-card { width: 400px; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h1 { text-align: center; font-size: 24px; color: #303133; margin-bottom: 8px; }
        .login-card .subtitle { text-align: center; color: #909399; font-size: 14px; margin-bottom: 32px; }
        .login-card .el-button { width: 100%; }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <h1>📚 CompanyRag</h1>
        <div class="subtitle">企业知识库智能检索系统</div>
        <el-form :model="form" label-position="top">
            <el-form-item label="租户编码">
                <el-input v-model="form.tenantCode" placeholder="请输入租户编码" />
            </el-form-item>
            <el-form-item label="用户名">
                <el-input v-model="form.username" placeholder="请输入用户名" />
            </el-form-item>
            <el-form-item label="密码">
                <el-input type="password" v-model="form.password" placeholder="请输入密码" show-password />
            </el-form-item>
            <el-form-item>
                <el-button type="primary" @click="handleLogin" size="large">登 录</el-button>
            </el-form-item>
        </el-form>
    </div>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
<script>
const { createApp, ref } = Vue;
createApp({
    setup() {
        const form = ref({ tenantCode: 'default', username: 'admin', password: 'admin123' });
        function handleLogin() {
            ElementPlus.ElMessage.success('登录成功（演示模式）');
            window.location.href = '/index';
        }
        return { form, handleLogin };
    }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
